<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <title>Kostku - Dashboard</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/page.css">
</head>

<body>
    <div class="main">
        <!-- SIDEBAR -->
        <div id="sidebar"></div>
        <div id="overlay" class="overlay"></div>

        <div class="main-content">
            <!-- TOPBAR -->
            <div id="topbar"></div>

            <!-- DASHBOARD PAGE -->
            <main class="page dashboard" id="content">

                <header class="page-header">
                    <div class="page-title">
                        <h1>Selamat Datang, Saifulloh Fattah</h1>

                          Berikut adalah ringkasan informasi Anda
                        </span>
                    </div>

                <!-- CONTENT -->

                <!-- DASHBOARD - CARDS -->
                <div class="dashboard-cards grid-2">
                    <div class="dashboard-card card-blue">
                        <div class="card-header">
                            <img src="../img/dashboard-penghuni-kamar.png">
                        </div>

                        <h2>KM003</h2>
                    </div>
                    <div class="dashboard-card card-yellow">
                        <div class="card-header">
                            <img src="../img/dasboard-penghuni-pembayaran.png">
                        </div>
                        <h4>Periode Pembayaran</h4>
                        <h2>April 2026</h2>
                    </div>
                </div>
                <div class="table-container-penguni">
                </div>

    <!-- SCRIPT -->
    <script src="../js/main.js"></script>
